        description: Specifies whether to overwrite the VM at the target location.
          This is a data destructive operation and if this is selected, the original
          VM may no longer be accessible. This option is only applicable if renameRecoveredVmParams
          is null and powerOffAndRenameExistingVm is false. This option is not supported
          for vApp or vApp template recoveries. Default value is false.
        type: boolean
        x-nullable: true
      powerOffAndRenameExistingVm:
        description: Specifies whether to power off and mark the VM at the target
          location as deprecated. As an example, <vm_name> will be renamed to deprecated::<vm_name>,
          and a new VM with the name <vm_name> in place of the now deprecated VM.
          Both deprecated::<vm_name> and <vm_name> will exist on the primary, but
          the corresponding protection job will only backup <vm_name> on its next
          run. Only applicable if renameRecoveredVmParams is null and overwriteExistingVm
          is false. This option is not supported for vApp or vApp template recoveries.
          Default value is false.
        type: boolean
        x-nullable: true
      powerOnVms:
        description: Specifies whether to power on vms after recovery. If not specified,
          or false, recovered vms will be in powered off state.
        type: boolean
        x-nullable: true
      recoverExcludedDisks:
        description: If this field is set to true, then the user excluded disks will
          be recovered as blank disks.
        type: boolean
        x-nullable: true
      recoverIndependentDisks:
        description: If this field is set to true, then the independent disks which
          were excluded while backup will be recovered as blank disks.
        type: boolean
        x-nullable: true
      recoveryProcessType:
        description: Specifies type of Recovery Process to be used. InstantRecovery/CopyRecovery
          etc... Default value is InstantRecovery.
        enum:
        - InstantRecovery
        - CopyRecovery
        type: string
      recoveryTargetConfig:
        $ref: '#/definitions/VmwareVmRecoveryTargetConfig'
        description: Specifies the recovery target configuration if recovery has to
          be done to a different location which is different from original source
          or to original Source with different configuration. If not specified, then
          the recovery of the vms will be performed to original location with all
          configuration parameters retained.
        x-nullable: true
      renameRecoveredVmsParams:
        $ref: '#/definitions/RecoveredOrClonedVmsRenameConfig'
        description: Specifies params to rename the VMs that are recovered. If not
          specified, the original names of the VMs are preserved.
        x-nullable: true
      vlanConfig:
        $ref: '#/definitions/RecoveryVlanConfig'
        description: 'Specifies VLAN Params associated with the recovered. If this
          is not specified, then the VLAN settings will be automatically selected
          from one of the below options: a. If VLANs are configured on Cohesity, then
          the VLAN host/VIP will be automatically based on the client''s (e.g. ESXI
          host) IP address. b. If VLANs are not configured on Cohesity, then the partition
          hostname or VIPs will be used for Recovery.'
        x-nullable: true
    title: VMware Target Params.
    type: object
  VmwareThrottlingParams:
    description: Specifies throttling params.
    properties:
      activeTaskLatencyThresholdMsecs:
        description: If the latency of a datastore is above this value, then an existing
          backup task that uses the datastore will start getting throttled.
        format: int64
        type: integer
        x-nullable: true
      maxConcurrentBackups:
        description: Specifies the number of VMs of a vCenter that can be backed up
          concurrently.
        format: int32
        type: integer
        x-nullable: true
      maxConcurrentStreams:
        description: If this value is > 0 and the number of streams concurrently active
          on a datastore is equal to it, then any further requests to access the datastore
          would be denied until the number of active streams reduces. This applies
          for all the datastores in the specified host.
        format: int32
        type: integer
        x-nullable: true
      newTaskLatencyThresholdMsecs:
        description: If the latency of a datastore is above this value, then a new
          backup task that uses the datastore won't be started.
        format: int64
        type: integer
        x-nullable: true
    title: Throttling Params.
    type: object
  VmwareVAppRecoveryTargetConfig:
    description: Specifies the target object parameters to recover VMware vApps.
    properties:
      newSourceConfig:
        $ref: '#/definitions/RecoverVmwareVAppNewSourceConfig'
        description: Specifies the new destination Source configuration parameters
          where the VMs will be recovered. This is mandatory if recoverToNewSource
          is set to true.
        x-nullable: true
      originalSourceConfig:
        $ref: '#/definitions/RecoverVmwareVAppOriginalSourceConfig'
        description: Specifies the Source configuration if VM's are being recovered
          to Original Source. If not specified, all the configuration parameters will
          be retained.
        x-nullable: true
      recoverToNewSource:
        description: Specifies the parameter whether the recovery should be performed
          to a new or an existing Source Target.
        type: boolean
    required:
    - recoverToNewSource
    title: Vmware VMs Recovery Target Config.
    type: object
  VmwareVAppTemplateRecoveryTargetConfig:
    description: Specifies the target object parameters to recover VMware vApp templates.
    properties:
      newSourceConfig:
        $ref: '#/definitions/RecoverVmwareVAppTemplateNewSourceConfig'
        description: Specifies the new destination Source configuration parameters
          where the vApp templates will be recovered. This is mandatory if recoverToNewSource
          is set to true.
        x-nullable: true
      originalSourceConfig:
        $ref: '#/definitions/RecoverVmwareVAppOriginalSourceConfig'
        description: Specifies the Source configuration if vApp templates are being
          recovered to Original Source. If not specified, all the configuration parameters
          will be retained.
        x-nullable: true
      recoverToNewSource:
        description: Specifies the parameter whether the recovery should be performed
          to a new or an existing Source Target.
        type: boolean
    required:
    - recoverToNewSource
    title: Vmware vApp Template Recovery Target Config.
    type: object
  VmwareVmRecoveryTargetConfig:
    description: Specifies the target object parameters to recover VMware vms.
    properties:
      newSourceConfig:
        $ref: '#/definitions/RecoverVmwareVmNewSourceConfig'
        description: Specifies the new destination Source configuration parameters
          where the VMs will be recovered. This is mandatory if recoverToNewSource
          is set to true.
        x-nullable: true
      originalSourceConfig:
        $ref: '#/definitions/RecoverVmwareVmOriginalSourceConfig'
        description: Specifies the Source configuration if VM's are being recovered
          to Original Source. If not specified, all the configuration parameters will
          be retained.
        x-nullable: true
      recoverToNewSource:
        description: Specifies the parameter whether the recovery should be performed
          to a new or an existing Source Target.
        type: boolean
    required:
    - recoverToNewSource
    title: Vmware VMs Recovery Target Config.
    type: object
  VolumeInfo:
    description: Specifies info of logical volume (filesystem).
    properties:
      filesystemType:
        description: Specifies the filesystem type.
        type: string
        x-nullable: true
      filesystemUuid:
        description: Specifies the filesystem uuid.
        type: string
        x-nullable: true
      isDedupe:
        description: Specifies if this is NTFS dedupe volume
        type: boolean
        x-nullable: true
      isSupported:
        description: Specifies if this volume is supported.
        type: boolean
        x-nullable: true
      logicalVolumeInfo:
        $ref: '#/definitions/LogicalVolumeInfo'
        description: Specifies the logical volume info. This fields is for 'LVM' and
          'LDM' volume type only.
        x-nullable: true
      name:
        description: Specifies the volume name.
        type: string
        x-nullable: true
      volumeGuid:
        description: Specifies the volume guid.
        type: string
        x-nullable: true
      volumeSizeInBytes:
        description: Specifies volume size in bytes.
        format: int64
        type: integer
        x-nullable: true
      volumeType:
        description: Specifies the volume type.
        enum:
        - SimpleVolume
        - LVM
        - LDM
        type: string
        x-nullable: true
    type: object
  WebhookDeliveryTarget:
    description: Webhook config for the alerts matching this rule.
    properties:
      curlOptions:
        description: Options for webhook
        type: string
      webhookUrl:
        description: Destination webhook URL
        type: string
    required:
    - webhookUrl
    type: object
  WeekSchedule:
    description: Specifies settings that define a schedule for a Protection Group
      runs to start on certain days of week.
    properties:
      dayOfWeek:
        description: 'Specifies a list of days of the week when to start Protection
          Group Runs. <br> Example: To run a Protection Group on every Monday and
          Tuesday, set the schedule with following values: <br>  unit: ''Weeks'' <br>  dayOfWeek:
          [''Monday'',''Tuesday'']'
        items:
          enum:
          - Sunday
          - Monday
          - Tuesday
          - Wednesday
          - Thursday
          - Friday
          - Saturday
          type: string
        type: array
        x-nullable: true
    required:
    - dayOfWeek
    title: Week Schedule
  WorkerEndpoint:
    description: Definition of worker endpoint to which client should connect to access
      data and metadata of the object.
    properties:
      endpoint:
        description: Specifies the end point of the worker which is combination of
          both endpoint and port number.
        type: string
    title: Worker endpoint definition.
    type: object
  WorkflowInterventionSpec:
    description: Specifies the intervention for each workflow type.
    properties:
      intervention:
        description: Specifies the intervention type for ongoing tasks.
        enum:
        - NoIntervention
        - Cancel
        type: string
        x-nullable: true
      workflowType:
        description: Specifies the workflow type for which an intervention would be
          needed when maintenance mode begins
        enum:
        - BackupRun
        type: string
        x-nullable: true
    required:
    - workflowType
    - intervention
  WorkloadStatsSchema:
    allOf:
    - $ref: '#/definitions/WorkloadSubType'
    - properties:
        subTypes:
          description: Specifies the Workload Sub-Types.
          items:
            $ref: '#/definitions/WorkloadSubType'
          type: array
          x-nullable: true
      type: object
    description: Specifies the workload types.
    type: object
  WorkloadStatsSummary:
    description: Specifies the Workload Stats Summary Schema.
    properties:
      workloads:
        description: Specifies the Workload types.
        items:
          $ref: '#/definitions/WorkloadStatsSchema'
        type: array
        x-nullable: true
    type: object
  WorkloadSubType:
    allOf:
    - $ref: '#/definitions/EntityIdentifier'
    - properties:
        entities:
          description: Specifies the entities part of Workload schema.
          items:
            $ref: '#/definitions/EntityIdentifier'
          type: array
          x-nullable: true
        schema:
          description: Specifies the Schema Name of Workload.
          type: string
          x-nullable: true
      type: object
    description: Specifies the Workload Sub-Type.
    type: object
  WormConfig:
    description: Specifies WORM related configs for a LSU. Once enabled, WORM cannot
      be removed. Any view created on this LSU will inherit these configs.
    properties:
      maxRetentionSecs:
        description: Specifies max retention period in seconds. It must be greater
          than or equal to `min_retention_secs`.
        format: int64
        minimum: 1
        type: integer
        x-nullable: true
      minRetentionSecs:
        description: Specifies min retention period in seconds. It must be greater
          than 0.
        format: int64
        minimum: 1
        type: integer
        x-nullable: true
      mode:
        description: Specifies WORM mode. It can be set to either 'Enterprise' or
          'Compliance'. If mode is set to 'Compliance', it cannot be changed later.
        enum:
        - Compliance
        - Enterprise
        type: string
        x-nullable: true
    type: object
    x-nullable: true
  WormProperties:
    description: Specifies the WORM related properties for this archive.
    properties:
      isArchiveWormCompliant:
        description: Specifies whether this archive run is WORM compliant
        type: boolean
        x-nullable: true
      wormExpiryTimeUsecs:
        description: Specifies the time at which the WORM protection expires.
        format: int64
        type: integer
        x-nullable: true
      wormNonComplianceReason:
        description: Specifies reason of archive not being worm compliant.
        type: string
        x-nullable: true
    title: WORM Archival data.
    type: object
  WormSpecificTargetParams:
    description: Specifies the parameters which specific to WORM and needs to passed
      when WORM is enabled for archival External Targets.
    properties:
      applicationId:
        description: Specifies the application id of worm enabled external target.
        type: string
        x-nullable: true
      encryptedApplicationKey:
        description: Specifies the encrypted application key of worm enabled external
          target.
        type: string
        x-nullable: true
      resourceGroup:
        description: Specifies the resource group of worm enabled external target.
        type: string
        x-nullable: true
      subscriptionId:
        description: Specifies the subscription id of worm enabled external target.
        type: string
        x-nullable: true
      tenantId:
        description: Specifies the tenant id of worm enabled external target.
        type: string
        x-nullable: true
    title: Azure External Target Request WORM Params for archival purpose type.
    type: object
  YearSchedule:
    description: Specifies settings that define a schedule for a Protection Group
      to run on specific year and specific day of that year.
    properties:
      dayOfYear:
        description: 'Specifies the day of the Year (such as ''First'' or ''Last'')
          in a Yearly Schedule. <br>This field is used to define the day in the year
          to start the Protection Group Run. <br> Example: if ''dayOfYear'' is set
          to ''First'', a backup is performed on the first day of every year. <br>
          Example: if ''dayOfYear'' is set to ''Last'', a backup is performed on the
          last day of every year.'
        enum:
        - First
        - Last
        type: string
        x-nullable: true
      monthDay:
        $ref: '#/definitions/MonthDay'
        description: 'Specifies the month and day in a year when to start copy tasks
          i.e. Replication / Archival <br> Example: To run a Protection Group on every
          15th of January, set the schedule with following values: <br>  unit: ''kDayOfTheYear''
          <br>  monthDay: [''01-01'']'
        type: object
        x-nullable: true
    title: Year Schedule
  agentHost:
    description: Specifies the details of the agent host associated with the registered
      source.
    properties:
      agentHostId:
        description: Specifies the id of the agent associated with this host.
        type: string
        x-nullable: true
      hostId:
        description: Specifies the ID of the host.
        type: string
        x-nullable: true
      hostName:
        description: Specifies the primary network identifier/hostname of the host.
        type: string
        x-nullable: true
      ipAddresses:
        description: Array of IPv4 or IPv6 ip addresses associated with the host.
        items:
          description: IPv4 or IPv6 address of the host.
          type: string
        type: array
        x-nullable: true
      mongodbPhysicalConnector:
        $ref: '#/definitions/MongoDbPhysicalConnectorMetadata'
        description: Specifies the MongoDB Physical connector specific metadata.
        type: object
        x-nullable: true
    type: object
  vaultTags:
    description: Specifies a key-value pair for the vault tags.
    properties:
      key:
        description: Specifies the key of the tag.
        type: string
        x-nullable: true
      value:
        description: Specifies the value of the tag.
        type: string
        x-nullable: true
    title: Tags for the external target.
    type: object
info:
  description: Cohesity API provides a RESTful interface to access the various data
    management operations on Cohesity cluster and Helios.
  title: Cohesity REST API
  version: '2.0'
paths:
  /access-tokens:
    post:
      description: '```No Privileges Required``` <br><br>Before making other REST
        API requests, your REST client must make a an access token request with a
        valid Cohesity username and password. This POST request returns an access
        token and type in the response that is generated by the Cohesity Cluster.
        Subsequent requests to other Cohesity REST API operations must specify the
        returned access token and type by setting ''Authorization'' in the http header
        in the following format: <br/>`Authorization: token_type access_token`

        <br/>The generated token is valid for 24 hours. If a request is made with
        an expired token, the ''Token expired'' error message is returned. Add code
        to your REST client to check for this error and request another access token
        before reissuing the request.

        <br/><br/>`Note:`*This endpoint is unavailable when session management is
        enabled. <br/>Please use the `POST /users/sessions` endpoint to generate a
        session token for request authentication.*"

        '
      operationId: CreateAccessToken
      parameters:
      - description: Specifies the parameters to generate an access token
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/CreateAccessTokenRequestParams'
      responses:
        '201':
          description: Success
          schema:
            $ref: '#/definitions/AccessTokenResponse'
        default:
          description: Error
          schema:
            $ref: '#/definitions/Error'
      summary: Create a new API access token
      tags:
      - AccessToken
  /active-directories:
    get:
      description: '**Privileges:** ```AD_LDAP_VIEW``` <br><br>Get the list of Active
        Directories.'
      operationId: GetActiveDirectory
      parameters:
      - description: Filter by a list of Active Directory domain names.
        in: query
        items:
          pattern: ^([a-zA-Z0-9]|[a-zA-Z0-9][a-zA-Z0-9_\-]{0,61}[a-zA-Z0-9])(\.([a-zA-Z0-9]|[a-zA-Z0-9][a-zA-Z0-9_\-]{0,61}[a-zA-Z0-9]))*$
          type: string
        name: domainNames
        type: array
      - description: Filter by a list of Active Directory Ids.
        in: query
        items:
          format: int64
          type: integer
        name: ids
        type: array
      - description: TenantIds contains ids of the tenants for which Active Directories
          are to be returned.
        in: query
        items:
          type: string
        name: tenantIds
        type: array
      - description: If true, the response will include Active Directories which were
          created by all tenants which the current user has permission to see. If
          false, then only Active Directories created by the current user will be
          returned.
        in: query
        name: includeTenants
        type: boolean
      responses:
        '200':
          description: Success
          schema:
            $ref: '#/definitions/ActiveDirectories'
        default:
          description: Error
          schema:
            $ref: '#/definitions/Error'
      security:
      - Bearer: []
      - SessionIdHeader: []
      - APIKeyHeader: []
      summary: Get the list of Active Directories.
      tags:
      - ActiveDirectory
    post:
      description: '**Privileges:** ```AD_LDAP_MODIFY``` <br><br>Create an Active
        Directory.'
      operationId: CreateActiveDirectory
      parameters:
      - description: Specifies the parameters to create an Active Directory.
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/CreateActiveDirectoryRequest'
      responses:
        '201':
          description: Success
          schema:
            $ref: '#/definitions/ActiveDirectory'
        default:
          description: Error
          schema:
            $ref: '#/definitions/Error'
      security:
      - Bearer: []
      - SessionIdHeader: []
      - APIKeyHeader: []
      summary: Create an Active Directory.
      tags:
      - ActiveDirectory
  /active-directories/{id}:
    delete:
      description: '**Privileges:** ```AD_LDAP_MODIFY``` <br><br>Delete an Active
        Directory.'
      operationId: DeleteActiveDirectory
      parameters:
      - description: Specifies id of an Active Directory.
        format: int64
        in: path
        name: id
        required: true
        type: integer
      - description: Specifies the username of the Active Directory Admin.
        in: header
        name: activeDirectoryAdminUsername
        required: true
        type: string
      - description: Specifies the password of the Active Directory Admin.
        in: header
        name: activeDirectoryAdminPassword
        required: true
        type: string
      - description: To force delete the Active directory from cluster. This will
          skip all the checks that prevents cluster from leaving an AD domain.
        in: query
        name: forceRemove
        type: boolean
      responses:
        '204':
          description: No Content
        default:
          description: Error
          schema:
            $ref: '#/definitions/Error'
      security:
      - Bearer: []
      - SessionIdHeader: []
      - APIKeyHeader: []
      summary: Delete an Active Directory.
      tags:
      - ActiveDirectory
    get:
      description: '**Privileges:** ```AD_LDAP_VIEW``` <br><br>Get an Active Directory
        by id.'
      operationId: GetActiveDirectoryById
      parameters:
      - description: Specifies id of an Active Directory.
        format: int64
        in: path
        name: id
        required: true
        type: integer
      - description: Specifies whether to include Centrify Zones of the Active Directory
          in response.
        in: query
        name: includeCentrifyZones
        type: boolean
      - description: Specifies whether to include Domain Controllers of the Active
          Directory in response.
        in: query
        name: includeDomainControllers
        type: boolean
      - description: Specifies whether to include Security Principals of the Active
          Directory in response.
        in: query
        name: includeSecurityPrincipals
        type: boolean
      - description: Specifies a prefix, only security principals with name or sAMAccountName
          having this prefix (ignoring cases) will be returned. This field is appliciable
          and mandatory if 'includeSecurityPrincipals' is set to true.
        in: query
        name: prefix
        type: string
      - description: Specifies a list of object classes, only security principals
          with object class in this list will be returned. This field is appliciable
          if 'includeSecurityPrincipals' is set to true.
        in: query
        items:
          enum:
          - User
          - Group
          - Computer
          - WellKnownPrincipal
          - ServiceAccount
          type: string
        name: objectClass
        type: array
        uniqueItems: true
      responses:
        '200':
          description: Success
          schema:
            $ref: '#/definitions/ActiveDirectory'
        default:
          description: Error
          schema:
            $ref: '#/definitions/Error'
      security:
      - Bearer: []
      - SessionIdHeader: []
      - APIKeyHeader: []
      summary: Get an Active Directory by id.
      tags:
      - ActiveDirectory
    put:
      description: '**Privileges:** ```AD_LDAP_MODIFY``` <br><br>Update an Active
        Directory.'
      operationId: UpdateActiveDirectory
      parameters:
      - description: Specifies id of an Active Directory.
        format: int64
        in: path
        name: id
        required: true
        type: integer
      - description: Request to update an Active Directory.
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/UpdateActiveDirectoryRequest'
      responses:
        '200':
          description: Success
          schema:
            $ref: '#/definitions/ActiveDirectory'
        default:
          description: Error
          schema:
            $ref: '#/definitions/Error'
      security:
      - Bearer: []
      - SessionIdHeader: []
      - APIKeyHeader: []
      summary: Update an Active Directory.
      tags:
      - ActiveDirectory
  /active-directory-principals:
    get:
      description: '**Privileges:** ```PRINCIPAL_VIEW, AD_LDAP_VIEW``` <br><br>Get
        the list of user and group principals from the Active Directory that match
        the specified filter criteria.'
      operationId: GetActiveDirectoryPrincipals
      parameters:
      - description: Specifies the domain name of the principals to search. If specified
          the principals in that domain are searched. Domain could be an Active Directory
          domain joined by the Cluster or any one of the trusted domains of the Active
          Directory domain or the LOCAL domain. If not specified, all the domains
          are searched.
        in: query
        name: domainName
        pattern: ^([a-zA-Z0-9]|[a-zA-Z0-9][a-zA-Z0-9_\-]{0,61}[a-zA-Z0-9])(\.([a-zA-Z0-9]|[a-zA-Z0-9][a-zA-Z0-9_\-]{0,61}[a-zA-Z0-9]))*$
        type: string
      - description: 'Optionally filter by a list of security identifiers (SIDs) found
          in the specified domain. Only principals matching the specified SIDs are
          returned. If specified, a ''searchTerm'' parameter should not be specified.
          Note: Duplicate SIDs will be ignored.'
        in: query
        items:
          type: string
        name: sids
        type: array
      - description: Optionally filter by matching a substring. Only principals with
          a name or sAMAccountName that matches part or all of the specified substring
          are returned. If specified, a 'sids' parameter should not be specified
        in: query
        name: searchTerm
        type: string
      - description: Specifies if Computer/GMSA accounts need to be included in this
          search.
        in: query
        name: includeComputers
        type: boolean
      - description: Specifies if service accounts should be included in the search
          result.
        in: query
        name: includeServiceAccounts
        type: boolean
      - description: Specifies the type of principal, a user or a group.
        enum:
        - User
        - Group
        - Computer
        - WellKnownPrincipal
        - ServiceAccount
        in: query
        name: objectClass
        type: string
      responses:
        '200':
          description: Success
          schema:
            $ref: '#/definitions/ActiveDirectoryPrincipals'
        default:
          description: Error
          schema:
            $ref: '#/definitions/Error'
      security:
      - Bearer: []
      - SessionIdHeader: []
      - APIKeyHeader: []
      summary: Get the list of user and group principals from the Active Directory
        that match the specified filter criteria.
      tags:
      - ActiveDirectory
    post:
      description: '**Privileges:** ```PRINCIPAL_MODIFY``` <br><br>After a group or
        user has been added to a Cohesity Cluster, the referenced Active Directory
        principal can be used by the Cohesity Cluster. In addition, this operation
        maps Cohesity roles with a group or user and this mapping defines the privileges
        allowed on the Cohesity Cluster for the group or user. For example if an ''management''
        group is created on the Cohesity Cluster for the Active Directory ''management''
        principal group and is associated with the Cohesity ''View'' role, all users
        in the referenced Active Directory ''management'' principal group can log
        in to the Cohesity Dashboard but will only have view-only privileges. These
