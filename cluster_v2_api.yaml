  /fortknox-onprem/vaulting/activities:
    get:
      description: '```No Privileges Required``` <br><br>Get a list of Fortknox Onprem
        vaulting activities.'
      operationId: GetFortknoxOnpremVaultingActivities
      parameters:
      - description: Start time for time range filter. Specify the start time as a
          Unix epoch Timestamp (in microseconds), only vaulting runs started after
          this time will be returned. By default, it is set to 7 days prior to the
          current time.
        format: int64
        in: query
        name: startTimeUsecs
        type: integer
      - description: End time for time range filter. Specify the end time as a Unix
          epoch Timestamp (in microseconds), only vaulting runs started before this
          time will be returned. By default, it is the current time.
        format: int64
        in: query
        name: endTimeUsecs
        type: integer
      - description: Specifies a list of Fortknox Onprem vaulting replication runs
          status, runs matching the status will be returned.<br> 'Running' indicates
          that the run is still running.<br> 'Canceled' indicates that the run has
          been canceled.<br> 'Canceling' indicates that the run is in the process
          of being canceled.<br> 'Failed' indicates that the run has failed.<br> 'Missed'
          indicates that the run was unable to take place at the scheduled time because
          the previous run was still happening.<br> 'Succeeded' indicates that the
          run has finished successfully.<br> 'SucceededWithWarning' indicates that
          the run finished successfully, but there were some warning messages.<br>
          'Paused' indicates that the ongoing run has been paused.<br> 'Skipped' indicates
          that the run was skipped.
        in: query
        items:
          enum:
          - Accepted
          - Running
          - Canceled
          - Canceling
          - Failed
          - Missed
          - Succeeded
          - SucceededWithWarning
          - OnHold
          - Finalizing
          - Skipped
          - LegalHold
          - Paused
          type: string
        name: statuses
        type: array
      - description: sourceClusterIds contains ids of the source clusters for which
          vaulting replication runs are to be returned.
        in: query
        items:
          format: int64
          type: integer
        name: sourceClusterIds
        type: array
      - description: Specifies the cookie to fetch the next page of results
        in: query
        name: paginationCookie
        type: string
        x-nullable: true
      - description: Specifies the max number of runs to return. If not specified,
          at most 100 runs will be returned.
        format: int64
        in: query
        name: maxRuns
        type: integer
        x-nullable: true
      responses:
        '200':
          description: Success
          schema:
            $ref: '#/definitions/FortknoxOnpremVaultingActivities'
        default:
          description: Error
          schema:
            $ref: '#/definitions/Error'
      security:
      - Bearer: []
      - SessionIdHeader: []
      - APIKeyHeader: []
      summary: Get a list of Fortknox Onprem vaulting activities.
      tags:
      - FortknoxOnprem
