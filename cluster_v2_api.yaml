  /data-protect/runs/summary:
    get:
      description: '**Privileges:** ```PROTECTION_VIEW``` <br><br>Get a list of protection
        runs.'
      operationId: GetProtectionRuns
      parameters:
      - description: Start time for time range filter. Specify the start time as a
          Unix epoch Timestamp (in microseconds), only runs executing after this time
          will be returned. By default it is endTimeUsecs minus an hour.
        format: int64
        in: query
        name: startTimeUsecs
        type: integer
      - description: End time for time range filter. Specify the end time as a Unix
          epoch Timestamp (in microseconds), only runs executing before this time
          will be returned. By default it is current time.
        format: int64
        in: query
        name: endTimeUsecs
        type: integer
      - description: Specifies a list of status, runs matching the status will be
          returned.<br> 'Running' indicates that the run is still running.<br> 'Canceled'
          indicates that the run has been canceled.<br> 'Canceling' indicates that
          the run is in the process of being canceled.<br> 'Failed' indicates that
          the run has failed.<br> 'Missed' indicates that the run was unable to take
          place at the scheduled time because the previous run was still happening.<br>
          'Succeeded' indicates that the run has finished successfully.<br> 'SucceededWithWarning'
          indicates that the run finished successfully, but there were some warning
          messages.<br> 'Skipped' indicates that the run was skipped.
        in: query
        items:
          enum:
          - Accepted
          - Running
          - Canceled
          - Canceling
          - Failed
          - Missed
          - Succeeded
          - SucceededWithWarning
          - OnHold
          - Finalizing
          - Skipped
          - LegalHold
          type: string
        name: runStatus
        type: array
      responses:
        '200':
          description: Success
          schema:
            $ref: '#/definitions/ProtectionRunsSummary'
        default:
          description: Error
          schema:
            $ref: '#/definitions/Error'
      security:
      - Bearer: []
      - SessionIdHeader: []
      - APIKeyHeader: []
      summary: Get the list of runs.
      tags:
      - ProtectionGroup
  /data-protect/runs/{runId}/progress:
    get:
      description: '**Privileges:** ```PROTECTION_VIEW``` <br><br>Get the progress
        of a run.'
      operationId: GetProtectionRunProgress
      parameters:
      - description: Specifies a unique run id of the Protection Run.
        in: path
        name: runId
        required: true
        type: string
      - description: Specifies the objects whose progress will be returned. This only
          applies to protection group runs and will be ignored for object runs. If
          the objects are specified, the run progress will not be returned and only
          the progress of the specified objects will be returned.
        in: query
        items:
          format: int64
          type: integer
        name: objects
        type: array
      - description: TenantIds contains ids of the tenants for which the run is to
          be returned.
        in: query
        items:
          type: string
        name: tenantIds
        type: array
      - description: If true, the response will include Protection Group Runs which
          were created by all tenants which the current user has permission to see.
          If false, then only Protection Groups created by the current user will be
          returned. If it's not specified, it is true by default.
        in: query
        name: includeTenants
        type: boolean
      - description: Specifies whether to return finished tasks. By default only active
          tasks are returned.
        in: query
        name: includeFinishedTasks
        type: boolean
      - description: Specifies the time after which the progress task starts in Unix
          epoch Timestamp(in microseconds).
        format: int64
        in: query
        name: startTimeUsecs
        type: integer
      - description: Specifies the time before which the progress task ends in Unix
          epoch Timestamp(in microseconds).
        format: int64
        in: query
        name: endTimeUsecs
        type: integer
      - description: Specifies the maximum number of tasks to return.
        format: int32
        in: query
        name: maxTasksNum
        type: integer
      - description: Specifies whether to return objects. By default all the task
          tree are returned.
        in: query
        name: excludeObjectDetails
        type: boolean
      - description: Specifies whether to include event logs
        in: query
        name: includeEventLogs
        type: boolean
      - description: Specifies the number of levels till which to fetch the event
          logs. This is applicable only when includeEventLogs is true.
        format: int32
        in: query
        name: maxLogLevel
        type: integer
      - description: Specifies the task path of the run or object run. This is applicable
          only if progress of a protection group with one or more object is required.If
          provided this will be used to fetch progress details directly without looking
          actual task path of the object. Objects field is stil expected else it changes
          the response format.
        in: query
        name: runTaskPath
        type: string
      - description: Specifies the object level task path. This relates to the objectID.
          If provided this will take precedence over the objects, and will be used
          to fetch progress details directly without looking actuall task path of
          the object.
        in: query
        items:
          type: string
        name: objectTaskPaths
        type: array
      responses:
        '200':
          description: Success
          schema:
            $ref: '#/definitions/GetProtectionRunProgressBody'
        default:
          description: Error
          schema:
            $ref: '#/definitions/Error'
      security:
      - Bearer: []
      - SessionIdHeader: []
      - APIKeyHeader: []
      summary: Get the progress of a run.
      tags:
      - ProtectionGroup
