  TierLevelSettings:
    description: 'Specifies the settings tier levels configured with each archival
      target. The tier settings need to be applied in specific order and default tier
      should always be passed as first entry in tiers array. The following example
      illustrates how to configure tiering input for AWS tiering. Same type of input
      structure applied to other cloud platforms also. <br>If user wants to achieve
      following tiering for backup, <br>User Desired Tiering- <br><t>1.Archive Full
      back up for 12 Months <br><t>2.Tier Levels <br><t><t>[1,12] [ <br><t><t><t>s3
      (1 to 2 months), (default tier) <br><t><t><t>s3 Intelligent tiering (3 to 6
      months), <br><t><t><t>s3 One Zone (7 to 9 months) <br><t><t><t>Glacier (10 to
      12 months)] <br><t>API Input <br><t><t>1.tiers-[ <br><t><t><t>{''tierType'':
      ''S3'',''moveAfterUnit'':''months'', <br><t><t><t>''moveAfter'':2 - move from
      s3 to s3Inte after 2 months}, <br><t><t><t>{''tierType'': ''S3Inte'',''moveAfterUnit'':''months'',
      <br><t><t><t>''moveAfter'':4 - move from S3Inte to Glacier after 4 months},
      <br><t><t><t>{''tierType'': ''Glacier'', ''moveAfterUnit'':''months'', <br><t><t><t>''moveAfter'':
      3 - move from Glacier to S3 One Zone after 3 months }, <br><t><t><t>{''tierType'':
      ''S3 One Zone'', ''moveAfterUnit'': nil, <br><t><t><t>''moveAfter'': nil - For
      the last record, ''moveAfter'' and ''moveAfterUnit'' <br><t><t><t>will be ignored
      since there are no further tier for data movement } <br><t><t><t>}]'
    properties:
      awsTiering:
        $ref: '#/definitions/AWSTiers'
        description: Specifies the settings for AWS Tiers.
        type: object
        x-nullable: true
      azureTiering:
        $ref: '#/definitions/AzureTiers'
        description: Specifies the settings for Azure Tiers.
        type: object
        x-nullable: true
      cloudPlatform:
        description: Specifies the cloud platform to enable tiering.
