  /data-protect/sources/registrations:
    get:
      description: '**Privileges:** ```PROTECTION_VIEW``` <br><br>Get the list of
        Protection Source registrations.'
      operationId: GetSourceRegistrations
      parameters:
      - description: Ids specifies the list of source registration ids to return.
          If left empty, every source registration will be returned by default.
        in: query
        items:
          type: integer
        name: ids
        type: array
      - description: TenantIds contains ids of the tenants for which objects are to
          be returned.
        in: query
        items:
          type: string
        name: tenantIds
        type: array
      - description: If true, the response will include Registrations which were created
          by all tenants which the current user has permission to see. If false, then
          only Registrations created by the current user will be returned.
        in: query
        name: includeTenants
        type: boolean
      - description: If true, the encrypted crednetial for the registered sources
          will be included. Credential is first encrypted with internal key and then
          reencrypted with user supplied encryption key.
        in: query
        name: includeSourceCredentials
        type: boolean
      - description: Specifies the key to be used to encrypt the source credential.
          If includeSourceCredentials is set to true this key must be specified.
        in: query
        name: encryptionKey
        type: string
      - description: Specifies whether we can serve the GET request from the read
          replica cache. There is a lag of 15 seconds between the read replica and
          primary data source.
        in: query
        name: useCachedData
        type: boolean
      - description: If true, the external entity metadata like maintenance mode config
          for the registered sources will be included.
        in: query
        name: includeExternalMetadata
        type: boolean
      - description: If true, tenant migration check will be ignored
        in: query
        name: ignoreTenantMigrationInProgressCheck
        type: boolean
      - description: If true, the list of hosts associated with the registered source
          will be included. The default is value is false.
        in: query
        name: includeHosts
        type: boolean
      responses:
        '200':
          description: Success
          schema:
            $ref: '#/definitions/SourceRegistrations'
        default:
          description: Error
          schema:
            $ref: '#/definitions/Error'
      security:
      - Bearer: []
      - SessionIdHeader: []
      - APIKeyHeader: []
      summary: Get the list of Protection Source registrations.
      tags:
      - Source
