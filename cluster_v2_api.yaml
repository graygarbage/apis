    get:
      description: '**Privileges:** ```CLUSTER_VIEW, TENANT_VIEW, STORAGE_DOMAIN_VIEW,
        STORAGE_VIEW, PROTECTION_VIEW``` <br><br>Get Time Series Stats.'
      operationId: GetTimeSeriesStats
      parameters:
      - description: Specifies the schema name.
        in: query
        name: schemaName
        required: true
        type: string
      - description: Specifies a list of metric names.
        in: query
        items:
          type: string
        minItems: 1
        name: metricNames
        required: true
        type: array
      - description: Specifies the entity id.
        in: query
        name: entityId
        type: string
      - description: Specifies an entity id list represented as a string. The stats
          result will be the sum over all these entities. Duplicate id's will be ignored.
          If both EntityIdList and EntityId are specified, EntityId will be ignored.
        in: query
        items:
          type: string
        minItems: 1
        name: entityIdList
        type: array
      - description: Specifies to create pro rated data point for every rollup interval
          instead of returning the actual raw data points. This should be used only
          when rollup function is provided.
        in: query
        name: prorateDataPoints
        type: boolean
      - description: Specifies if the response should return the difference of a data
          point with the previous datapoint. Used for determining the change in growth
          rate. Datapoint could be +x, 0, -x showing the growth is up, no change or
          down respectively.
        in: query
        name: includeGrowthChange
        type: boolean
      - description: Specifies the start time of series stats.
        format: int64
        in: query
        name: startTimeMsecs
        required: true
        type: integer
      - description: Specifies the end time of series stats, by default it is current
          time.
        format: int64
        in: query
        name: endTimeMsecs
        type: integer
      - description: Specifies the rollup function to apply to the data points for
          the time interval specified by rollupInternalSecs.
        enum:
        - kSum
        - kAverage
        - kCount
        - kMax
        - kMin
        - kMedian
        - kPercentile95
        - kLatest
        - kRate
        in: query
        name: rollupFunction
        type: string
      - description: Specifies the time interval granularity for the specified rollup
          function.
        format: int32
        in: query
        name: rollupIntervalSecs
        type: integer
      responses:
        '200':
          description: Success
          schema:
            $ref: '#/definitions/TimeSeriesStats'
        default:
          description: Error
          schema:
            $ref: '#/definitions/Error'
      security:
      - Bearer: []
      - SessionIdHeader: []
      - APIKeyHeader: []
      summary: Get Time Series Stats.
      tags:
      - Stats
