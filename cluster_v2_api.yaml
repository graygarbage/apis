          description: Success
          schema:
            $ref: '#/definitions/SourceRegistration'
        default:
          description: Error
          schema:
            $ref: '#/definitions/Error'
      security:
      - Bearer: []
      - SessionIdHeader: []
      - APIKeyHeader: []
      summary: Register a Protection Source.
