  AzureDiskExclusionParams:
    description: Specifies parameters to exclude Azure Disks attached to Azure VM
      at job or object level. A disk satisfying any of this criteria will be excluded
      from the backup job.
    properties:
      diskIds:
        description: Array of disk ids to be excluded during backup. This is only
          used at object level exclusion.
        items:
          type: string
        type: array
        x-nullable: true
      rawQuery:
        description: Raw boolean query given as input by the user to exclude volume
          based on tags. In the current version, the query contains only tags. Eg.
          query 1 - "K1" = "V1" AND "K2" IN ("V2", "V3") AND "K4" != "V4" Eg. query
          2 - "K1" != "V1" OR "K2" NOT IN ("V2", "V3") OR "K4" = "V4" All Keys and
          Values must be wrapped inside double quotes. Comparision Operators supported
          - IN, NOT IN, =, !=. Logical Operators supported - AND, OR. We cannot have
          AND, OR together in the query. Only one of them is allowed. The processed
          form for this query is stored in the above tagParamsArray.
        type: string
        x-nullable: true
      tagParamsArray:
        description: 'Array of TagParams objects. Each TagParams object consists of
          two vectors: for exclusion and inclusion. Each TagPararms object is present
          as an ORed item. User can only input queries of form: (<> AND <> AND <>
          ..) OR (<> AND <> AND <> ..) OR (..) OR (..) OR .. There cannot be an OR
          operator inside the bracket. Example query: (K1 = V1 AND K2 = V2 AND K3
          != V3) OR (K4 = V4 AND K6 != V6). This will lead to formation of two items
          in tagParamsArray. First item: {exclusionTagArray: [(K1, V1),  (K2, V2)],
          inclusionTagArray: [(K3, V3)]} Second item: {exclusionTagArray: [(K4, V4)],
          inclusionTagArray: [(K6, V6)]}.'
        items:
          $ref: '#/definitions/AzureDiskTagParams'
        type: array
        x-nullable: true
    title: Azure Disk Exclusion Params.
    type: object
  AzureDiskTag:
    description: A key - value pair tag that may be specified on Azure Disks.
    properties:
      key:
        description: Key of the tag specified on the azure disk.
        type: string
      value:
        description: Value of the tag specified on the azure disk.
        type: string
    type: object
  AzureDiskTagParams:
    description: 'Specifies the tag vectors used to exclude Azure Disks attached to
      Azure instance at global and object level. Contains two vectors: exclusion and
      inclusion. E.g., {exclusionTagArray: [(K1, V1),  (K2, V2)], inclusionTagArray:
      [(K3, V3)]} => This will exclude a particular volume iff it has all the tags
      in exclusionTagArray((K1, V1),  (K2, V2)) and has none of the tags in the inclusionTagArray((K3,
      V3)).'
    properties:
      exclusionTagArray:
        description: 'Array which contains tags for AND exclusion. E.g., exclusionTagArray:
          [(K1, V1),  (K2, V2)] => This will exclude a particular volume iff it has
          both these tags.'
        items:
          $ref: '#/definitions/AzureDiskTag'
        type: array
        x-nullable: true
      inclusionTagArray:
        description: 'Array which contains tags for AND inclusion. E.g., inclusionTagArray:
          [(K3, V3),  (K4, V4)] => This will exclude a particular volume iff it does
          not have both these tags.'
        items:
          $ref: '#/definitions/AzureDiskTag'
        type: array
        x-nullable: true
    type: object
  AzureEntityMetadata:
    description: Specifies the entity metadata of azure entities.
