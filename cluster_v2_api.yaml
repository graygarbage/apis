          \ in a view can be in one of the following:\nCompliance: Default mode of\
          \ datalock, in this mode,\n  Data Security Admin cannot modify/delete this\
          \ view when datalock\n  is in effect. Data Security Admin can delete this\
          \ view\n  when datalock is expired.\nEnterprise: In this mode, Data Security\
          \ Admin can change view name or\n  delete view when datalock is in effect.\
          \ Datalock in this mode can\n  be upgraded to 'Compliance' mode."
        enum:
        - Compliance
        - Enterprise
        type: string
        x-nullable: true
      state:
        description: "Specifies the lock state of the file.\nA lock state of a file\
          \ in a view can be in one of the following:\nUnconfigured: File does not\
          \ belong to data lock enabled view.\nUnlocked: A file created in a file\
          \ lock enabled view. It will remain in\n  this state until auto-lock timer\
          \ expires or user manually locks the file.\nLocked: A locked file has a\
          \ set retention period that prevents users from\n  modifying the file data\
          \ or extending, deleting, or renaming the file.\n  A locked file remain\
          \ in this state untill retention period expires.\nExpired: When retention\
          \ period ends, the file transition from the locked\n  state to the expired\
          \ state. User can not modify or rename a file in expired\n  state, but can\
          \ delete a file.\nHold: Expired file is kept in hold for administrator specified\
          \ retention\n  periods and deny any mutable or remove operation on locked\
          \ files until a\n  specific date."
        enum:
        - Unconfigured
        - Unlocked
        - Locked
        - Expired
        - Hold
        type: string
        x-nullable: true
