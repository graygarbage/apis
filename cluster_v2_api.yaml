  DataLockConfig:
    description: Specifies WORM retention type for the snapshots. When a WORM retention
      type is specified, the snapshots of the Protection Groups using this policy
      will be kept for the last N days as specified in the duration of the datalock.
      During that time, the snapshots cannot be deleted.
    properties:
      duration:
        description: Specifies the duration for a dataLock. <br> Example. If duration
          is 7 and unit is Months, the dataLock is enabled for last 7 * 30 = 210 days
          of the backup.
        format: int64
        minimum: 1
        type: integer
        x-nullable: true
      enableWormOnExternalTarget:
        description: Specifies whether objects in the external target associated with
          this policy need to be made immutable.
        type: boolean
        x-nullable: true
      mode:
        description: "Specifies the type of WORM retention type. \n'Compliance' implies\
          \ WORM retention is set for compliance reason. \n'Administrative' implies\
          \ WORM retention is set for administrative purposes."
        enum:
        - Compliance
        - Administrative
        type: string
        x-nullable: true
      unit:
        description: 'Specificies the Retention Unit of a dataLock measured in days,
          months or years. <br> If unit is ''Months'', then number specified in duration
          is multiplied to 30. <br> Example: If duration is 4 and unit is ''Months''
          then number of retention days will be 30 * 4 = 120 days. <br> If unit is
          ''Years'', then number specified in duration is multiplied to 365. <br>
          If duration is 2 and unit is ''Months'' then number of retention days will
          be 365 * 2 = 730 days.'
        enum:
        - Days
        - Weeks
        - Months
        - Years
        type: string
        x-nullable: true
    required:
    - mode
    - unit
    - duration
    type: object
