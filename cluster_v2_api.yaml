  ErasureCodingOption:
    description: Specifies a configuration profile for Erasure Coding, defining the
      data stripe layout and storage efficiency.
    properties:
      erasureCoding:
        $ref: '#/definitions/DataCodedStripesPair'
        description: Specifies the data and coded stripe counts for this erasure coding
          profile.
      inlineSupported:
        description: Specifies whether inline erasure coding is supported. If false,
          the system requires post-process erasure coding.
        type: boolean
      isSuboptimal:
        description: Specifies whether this erasure coding configuration is not recommended
          for the current cluster size. True when the cluster has fewer fault domains
          than required to safely heal data after domain failures.
        type: boolean
      minDomainsForHeal:
        description: Specifies the minimum number of failure domains needed to heal
          data with this erasure coding configuration. Populated when 'isSuboptimal'
          is true, allowing the UI to construct an appropriate warning message.
        format: int32
        type: integer
        x-nullable: true
      showConversionWarning:
        description: Specifies whether a conversion warning should be displayed. True
          when in edit mode and the erasure coding configuration differs from the
          current setting, indicating that changes apply only to newly ingested data.
        type: boolean
      showHigherRateWarning:
        description: Specifies whether a higher-rate warning should be displayed.
          True for high-rate erasure coding configurations (e.g., 12:4, 16:4) that
          may have limited support.
        type: boolean
      usableStoragePercent:
        description: Specifies the storage efficiency percentage, derived as (numDataStripes
          / (numDataStripes + numCodedStripes)) * 100. This value represents the portion
          of raw storage capacity available for data.
        format: int32
        type: integer
    type: object
  ErasureCodingParams:
    description: Specifies parameters for erasure coding.
    properties:
      delaySecs:
        description: Specifies the time in seconds when erasure coding starts.
        format: int32
        type: integer
        x-nullable: true
      enabled:
        description: Specifies whether to enable erasure coding on a Storage Domain.
        type: boolean
        x-nullable: true
      inlineEnabled:
        description: Specifies whether inline erasure coding is enabled. This field
          is applicable only if enabled is set to true.
        type: boolean
        x-nullable: true
      numCodedStripes:
        description: Specifies the number of coded stripes.
        format: int32
        type: integer
        x-nullable: true
      numDataStripes:
        description: Specifies the number of data stripes.
        format: int32
        type: integer
        x-nullable: true
    required:
    - enabled
    - numDataStripes
    - numCodedStripes
    title: Erasure Coding Parameters
    type: object
  Error:
    description: Specifies the error object with error code and a message.
    properties:
      errorCode:
        description: Specifies the error code.
        type: string
        x-nullable: true
      message:
        description: Specifies the error message.
        type: string
        x-nullable: true
      taskLogId:
        description: Specifies the TaskLogId of the failed task.
        type: string
