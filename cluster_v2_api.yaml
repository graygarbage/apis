        title: Blackout Window
        type: array
        x-nullable: true
      cascadedTargetsConfig:
        description: Specifies the configuration for cascaded replications. Using
          cascaded replication, replication cluster(Rx) can further replicate and
          archive the snapshot copies to further targets. Its recommended to create
          cascaded configuration where protection group will be created.
        items:
          $ref: '#/definitions/CascadedTargetConfiguration'
        type: array
      dataLock:
        description: This field is now deprecated. Please use the DataLockConfig in
          the backup retention.
        enum:
        - Compliance
        - Administrative
        type: string
        x-nullable: true
      description:
        description: Specifies the description of the Protection Policy.
        type: string
        x-nullable: true
      enableSmartLocalRetentionAdjustment:
        description: Specifies whether smart local retention adjustment is enabled
          or not. If enabled, local retention would be extended upon failure of any
          outgoing replications or archivals. Later, if manual intervention causes
          the failed copies to succeed, retention would automatically be reduced.
        type: boolean
        x-nullable: true
      extendedRetention:
        description: Specifies additional retention policies that should be applied
          to the backup snapshots. A backup snapshot will be retained up to a time
          that is the maximum of all retention policies that are applicable to it.
        items:
          $ref: '#/definitions/ExtendedRetentionPolicy'
        title: Extended Retention
        type: array
        x-nullable: true
      isCBSEnabled:
        description: Specifies true if Calender Based Schedule is supported by client.
          Default value is assumed as false for this feature.
        type: boolean
        x-nullable: true
      lastModificationTimeUsecs:
        description: Specifies the last time this Policy was updated. If this is passed
          into a PUT request, then the backend will validate that the timestamp passed
          in matches the time that the policy was actually last modified. If the two
          timestamps do not match, then the request will be rejected with a stale
          error.
        format: int64
        type: integer
        x-nullable: true
      name:
        description: Specifies the name of the Protection Policy.
        type: string
        x-nullable: true
      remoteTargetPolicy:
        $ref: '#/definitions/TargetsConfiguration'
        description: Specifies the remote, archival or cloudSpin targets where the
          snapshot is backed up.
        type: object
        x-nullable: true
      retryOptions:
        $ref: '#/definitions/RetryOptions'
        description: Specifies the retry options of a Protection Policy.
        type: object
        x-nullable: true
      rpoPolicySettings:
        $ref: '#/definitions/RpoPolicySettings'
        description: Specifies all the additional settings that are applicable only
          to an RPO policy. This can include storage domain, settings of different
          environments, etc.
        type: object
        x-nullable: true
      skipIntervalMins:
        description: Specifies the period of time before skipping the execution of
          new group Runs if an existing queued group Run of the same Protection group
          has not started. For example if this field is set to 30 minutes and a group
          Run is scheduled to start at 5:00 AM every day but does not start due to
          conflicts (such as too many groups are running). If the new group Run does
          not start by 5:30AM, the Cohesity Cluster will skip the new group Run. If
          the original group Run completes before 5:30AM the next day, a new group
          Run is created and starts executing. This field is optional.
        format: int32
        type: integer
        x-nullable: true
      version:
        description: Specifies the current policy verison. Policy version is incremented
          for optionally supporting new features and differentialting across releases.
        format: int32
        type: integer
        x-nullable: true
