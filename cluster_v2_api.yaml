  /file-services/views:
    get:
      description: '**Privileges:** ```STORAGE_VIEW``` <br><br>If no parameters are
        specified, all Views on the Cohesity Cluster are returned.

        Specifying parameters filters the results that are returned.

        NOTE: If maxCount is set and the number of Views returned exceeds the maxCount,

        there are more Views to return.

        To get the next set of Views, send another request and specify the id of the

        last View returned in viewList from the previous response.'
      operationId: GetViews
      parameters:
      - description: Filter by a list of View names.
        in: query
        items:
          type: string
        name: viewNames
        type: array
      - description: Filter by a list of View ids.
        in: query
        items:
          format: int64
          type: integer
        name: viewIds
        type: array
      - description: Filter by a list of Storage Domains (View Boxes) specified by
          id.
        in: query
        items:
          format: int64
          type: integer
        name: storageDomainIds
        type: array
      - description: Filter by a list of View Box names.
        in: query
        items:
          type: string
        name: storageDomainNames
        type: array
      - description: 'Filter by a list of protocol accesses. Only views with

          protocol accesses in these specified accesses list will be returned.'
        in: query
        items:
          enum:
          - NFS
          - NFS4
          - SMB
          - S3
          - Swift
          type: string
        name: protocolAccesses
        type: array
      - description: 'If true, the names in viewNames are matched by any partial rather
          than

          exactly matched.'
        in: query
        name: matchPartialNames
        type: boolean
      - description: Specifies a limit on the number of Views returned.
        format: int32
        in: query
        name: maxCount
        type: integer
      - description: 'Specifies if internal Views created by the Cohesity Cluster
          are

          also returned. In addition, regular Views are returned.'
        in: query
        name: includeInternalViews
        type: boolean
      - description: 'Specifies if Views with ID greater than BridgeConstants::kViewIdMangleMask

          should be returned. These Views are created by MagnetoV2 or NetBackup.'
        in: query
        name: skipHighIdViews
        type: boolean
      - description: 'Specifies if Protection Groups information needs to be returned
          along with

          view metadata. By default, if not set or set to true, Group information
          is

          returned.'
        in: query
        name: includeProtectionGroups
        type: boolean
      - description: 'If the number of Views to return exceeds the maxCount specified
          in the

          original request, specify the id of the last View

          from the viewList in the previous response

          to get the next set of Views.'
        format: int64
        in: query
        name: maxViewId
        type: integer
      - description: 'Specifies if inactive Views on this Remote Cluster (which have

          Snapshots copied by replication) should also be returned.

          Inactive Views are not counted towards the maxCount.

          By default, this field is set to false.'
        in: query
        name: includeInactive
        type: boolean
      - description: 'This field will be deprecated. Filter by Protection Group ids.

          Return Views that are being protected by listed Groups, which are specified
          by ids.

          If both protectionGroupIds and viewProtectionGroupIds are specified, only

          viewProtectionGroupIds will be used.'
        in: query
        items:
          format: int64
          type: integer
        name: protectionGroupIds
        type: array
      - description: 'Filter by Protection Group ids. Return Views that are being
          protected by

          listed Groups, which are specified by ids.'
        in: query
        items:
          type: string
        name: viewProtectionGroupIds
        type: array
      - description: 'Whether to get just the total number of views with the given
          input

          filters. If the flag is true, we ignore the parameter ''maxViews'' for the

          count. Also, if flag is true, list of views will not be returned.'
        in: query
        name: viewCountOnly
        type: boolean
      - description: 'Whether to get only view summary including ''name'', ''viewId'',

          ''storageDomainName'', ''storageDomainId'' and ''tenantId''.'
        in: query
        name: summaryOnly
        type: boolean
      - description: If set to true, the list is sorted descending by logical usage.
        in: query
        name: sortByLogicalUsage
        type: boolean
      - description: 'Sids of restricted principals who can access the view. This
          is an

          internal field and therefore does not have json tag.'
        in: query
        items:
          type: string
        name: internalAccessSids
        type: array
      - description: If true, view aliases are also matched with the names in viewNames.
        in: query
        name: matchAliasNames
        type: boolean
      - description: 'TenantIds contains ids of the tenants for which objects are
          to be

          returned.'
        in: query
        items:
          type: string
        name: tenantIds
        type: array
      - description: 'IncludeTenants specifies if objects of all the tenants under
          the

          hierarchy of the logged in user''s organization should be returned.'
        in: query
        name: includeTenants
        type: boolean
      - description: 'If set to true, stats of views will be returned. By default
          this parameter

          is set to false.'
        in: query
        name: includeStats
        type: boolean
      - description: Whether to include View file count by size.
        in: query
        name: includeFileCountBySize
        type: boolean
      - description: 'If set to true, the list will contain only the views for which
          antivirus

          scan is enabled.'
        in: query
        name: includeViewsWithAntivirusEnabledOnly
        type: boolean
      - description: 'If set to true, the list will contain only the views for which
          either

          file level data lock is enabled or view level data lock is enabled.'
        in: query
        name: includeViewsWithDataLockEnabledOnly
        type: boolean
      - description: 'If set to true, only views with filer audit log enabled will
          be returned.

          If set to false, only views with filer audit log disabled will be returned.'
        in: query
        name: filerAuditLogEnabled
        type: boolean
      - description: Filter by a list of View categories.
        in: query
        items:
          enum:
          - BackupTarget
          - FileServices
          - ObjectServices
          - ArchiveServices
          type: string
        name: categories
        type: array
      - description: 'Filter by a list of View protection types. Supported types:
          [Local Archival ReplicationOut ReplicationIn UnProtected]. UnProtected is
          mutually exclusive from remaining types.'
        in: query
        items:
          enum:
          - Local
          - Archival
          - ReplicationOut
          - ReplicationIn
          - UnProtected
          type: string
        name: viewProtectionTypes
        type: array
      - description: Filter by last any run status of the view.<br> 'Running' indicates
          that the run is still running.<br> 'Canceled' indicates that the run has
          been canceled.<br> 'Canceling' indicates that the run is in the process
          of being canceled.<br> 'Failed' indicates that the run has failed.<br> 'Missed'
          indicates that the run was unable to take place at the scheduled time because
          the previous run was still happening.<br> 'Succeeded' indicates that the
          run has finished successfully.<br> 'SucceededWithWarning' indicates that
          the run finished successfully, but there were some warning messages.<br>
          'Skipped' indicates that the run was skipped.
        in: query
        items:
          enum:
          - Accepted
          - Running
          - Canceled
          - Canceling
          - Failed
          - Missed
          - Succeeded
          - SucceededWithWarning
          - OnHold
          - Finalizing
          - Skipped
          - LegalHold
          type: string
        name: lastRunAnyStatuses
        type: array
      - description: Filter by last local backup run status of the view.<br> 'Running'
          indicates that the run is still running.<br> 'Canceled' indicates that the
          run has been canceled.<br> 'Canceling' indicates that the run is in the
          process of being canceled.<br> 'Failed' indicates that the run has failed.<br>
          'Missed' indicates that the run was unable to take place at the scheduled
          time because the previous run was still happening.<br> 'Succeeded' indicates
          that the run has finished successfully.<br> 'SucceededWithWarning' indicates
          that the run finished successfully, but there were some warning messages.<br>
          'Skipped' indicates that the run was skipped.
        in: query
        items:
          enum:
          - Accepted
          - Running
          - Canceled
          - Canceling
          - Failed
          - Missed
          - Succeeded
          - SucceededWithWarning
          - OnHold
          - Finalizing
          - Skipped
          - LegalHold
          type: string
        name: lastRunLocalBackupStatuses
        type: array
      - description: Filter by last remote replication run status of the view.<br>
          'Running' indicates that the run is still running.<br> 'Canceled' indicates
          that the run has been canceled.<br> 'Canceling' indicates that the run is
          in the process of being canceled.<br> 'Failed' indicates that the run has
          failed.<br> 'Missed' indicates that the run was unable to take place at
          the scheduled time because the previous run was still happening.<br> 'Succeeded'
          indicates that the run has finished successfully.<br> 'SucceededWithWarning'
          indicates that the run finished successfully, but there were some warning
          messages.<br> 'Skipped' indicates that the run was skipped.
        in: query
        items:
          enum:
          - Accepted
          - Running
          - Canceled
          - Canceling
          - Failed
          - Missed
          - Succeeded
          - SucceededWithWarning
          - OnHold
          - Finalizing
          - Skipped
          - LegalHold
          type: string
        name: lastRunReplicationStatuses
        type: array
      - description: Filter by last cloud archival run status of the view.<br> 'Running'
          indicates that the run is still running.<br> 'Canceled' indicates that the
          run has been canceled.<br> 'Canceling' indicates that the run is in the
          process of being canceled.<br> 'Failed' indicates that the run has failed.<br>
          'Missed' indicates that the run was unable to take place at the scheduled
          time because the previous run was still happening.<br> 'Succeeded' indicates
          that the run has finished successfully.<br> 'SucceededWithWarning' indicates
          that the run finished successfully, but there were some warning messages.<br>
          'Skipped' indicates that the run was skipped.
        in: query
        items:
          enum:
          - Accepted
          - Running
          - Canceled
          - Canceling
          - Failed
          - Missed
          - Succeeded
          - SucceededWithWarning
          - OnHold
          - Finalizing
          - Skipped
          - LegalHold
          type: string
        name: lastRunArchivalStatuses
        type: array
      - description: Specifies the protection status of Views. If set to true, only
          protected Views will be returned. If set to false, only unprotected Views
          will be returned.
        in: query
        name: isProtected
        type: boolean
      - description: qosPrincipalIds contains ids of the QoS principal for which views
          are to be returned. This field is deprecated.
        in: query
        items:
          format: int64
          type: integer
        name: qosPrincipalIds
        type: array
      - description: Specifies a filter for Views based on the qosPolicies. This param
          will be prioritized if qosPrincipalIds is also specified.
        in: query
        items:
          enum:
          - BackupTargetHigh
          - BackupTargetLow
          - TestAndDevHigh
          - TestAndDevLow
          - BackupTargetSSD
          - BackupTargetCommvault
          - JournaledSequentialDump
          - BackupTargetAuto
          type: string
        name: qosPolicies
        type: array
      - description: Specifies whether we can serve the GET request to the read replica
          cache. There is a lag of 15 seconds between the read replica and primary
          data source.
        in: query
        name: useCachedData
        type: boolean
      - description: 'Specifies if deleted Protection Groups information needs to
          be returned along with

          view metadata. By default, deleted Protection Groups are not returned. This
          is only

          applied if used along with any view protection related parameter.'
        in: query
        name: includeDeletedProtectionGroups
        type: boolean
      - description: Specifies if all the Views should be returned as part of the
          response.
        in: query
        name: returnAllViews
        type: boolean
      - description: 'Specifies whether to return only views which have a

          s3 migration state.'
        in: query
        name: includeS3MigrationOnly
        type: boolean
      - description: 'Filter the list of Views by S3 Migration Statuses.

          Supported filter values are

          [Enabled, UnderMigration, Paused, Completed, Eligible]."

          If `s3MigrationState` is specified then

          `includeS3MigrationOnly` param should also be set to true.'
        enum:
        - Enabled
        - UnderMigration
        - Paused
        - Completed
