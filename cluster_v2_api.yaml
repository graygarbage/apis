  /data-source-connections/upgrade-config:
    get:
      description: '**Privileges:** ```CLUSTER_VIEW``` <br><br>Get upgrade connections
        config.'
      operationId: GetConnectionsUpgradeConfig
      responses:
        '200':
          description: Success
          schema:
            $ref: '#/definitions/UpgradeConfig'
        default:
          description: Error
          schema:
            $ref: '#/definitions/Error'
      security:
      - Bearer: []
      - SessionIdHeader: []
      - APIKeyHeader: []
      summary: Get upgrade connections config.
      tags:
      - DataSourceConnection
    put:
      description: '**Privileges:** ```CLUSTER_MODIFY``` <br><br>Updates the upgrade
        configuration for the data source connections.

        This supports both upgrade and patch operations. Upgrade can be

        used to set the connector to the specified version whereas patch

        can be used to update a connector within the same version. Connectors

        within a connection would be upgraded or patched in a rolling manner.

        Specific operation status for a connection can be fetched using GET

        data-source-connection. If the connection is removed from the config

        after the upgrade or patch is issued internally by the system, the

        connection''s operation status would not be updated for success or

        failure. Note that this is a config and action would be taken

        asynchronously at a later point in time, accordingly. Fields suffixed

        with UpgradePackageUrl must be used to upgrade connectors and those

        suffixed with PatchPackageUrl must be used to patch connectors.'
      operationId: UpdateConnectionsUpgradeConfig
      parameters:
      - description: Specifies the config to upgrade connections.
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/UpgradeConfig'
      responses:
        '200':
          description: Success
          schema:
            $ref: '#/definitions/UpgradeConfig'
        default:
          description: Error
          schema:
            $ref: '#/definitions/Error'
      security:
      - Bearer: []
      - SessionIdHeader: []
      - APIKeyHeader: []
      summary: Config for upgrading connections.
      tags:
      - DataSourceConnection
