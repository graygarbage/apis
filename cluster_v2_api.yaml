        status information.'
      operationId: GetClusterOperationStatusList
      parameters:
      - description: One or more operation types to query for.
        in: query
        items:
          enum:
          - Destroy
          - Create
          - NodeAddition
          - NodeRemoval
          - DownloadUpgradePackage
          - DownloadPatchPackage
          - DownloadUpgradeAndPatchPackages
          - DownloadAndUpgrade
          - DownloadAndApplyPatch
          - DownloadAndUpgradeWithPatch
          - Upgrade
          - ApplyPatch
          - RevertPatch
          - UpgradeAndPatch
          - AssessSoftwareUpdate
          - AbortApplyPatch
          - AbortUpgrade
          type: string
        name: operationTypes
        type: array
      - description: One or more operation ids to query for.
        in: query
        items:
          type: string
        name: operationIds
        type: array
      - description: Controls whether finished operations should be included in the
          query results. The default value is false. Applicable only for patch apply,
          revert, and upgrade operations
        in: query
        name: includeFinishedOperations
        type: boolean
      - description: Controls whether event logs should be included in the query results.
          If set to true, 'operationIds' becomes mandatory. The default value is false.
          Applicable only for patch apply, revert, and upgrade operations
        in: query
        name: includeEventLogs
        type: boolean
      - description: Filters operations that started after the specified time. Applicable
          only for patch apply, revert, and upgrade operations
        format: int64
        in: query
        name: startTime
        type: integer
      - description: Filters operations that ended before the specified time. Applicable
          only for patch apply, revert, and upgrade operations
        format: int64
        in: query
        name: endTime
        type: integer
