  /file-services/views/user-quotas:
    get:
      description: '**Privileges:** ```STORAGE_VIEW``` <br><br>Get user quotas for
        the View.'
      operationId: GetViewUserQuotasById
      parameters:
      - description: Specifies the View id. One of viewId, unixUid, sid must be specified.
        format: int64
        in: query
        name: viewId
        type: integer
      - description: If set to true, the logical usage info is included only for users
          with quota overrides. By default, it is set to false.
        in: query
        name: includeUsage
        type: boolean
      - description: If set to true, the result will only contain user with user quota
          override enabled. By default, this field is set to false, and it's only
          in effect when 'SummaryOnly' is set to false.
        in: query
        name: includeUserWithQuotaOverridesOnly
        type: boolean
      - description: This field can be set only when includeUsage is set to true.
          By default, all the users with logical usage > 0 will be returned in the
          result. If this field is set to true, only the list of users who has exceeded
          the alert threshold will be returned.
        in: query
        name: excludeUsersWithinAlertThreshold
        type: boolean
      - description: Specifies a flag to just return a summary. If set to true, it
          returns the summary of users for a view. By default, it is set to false.
        in: query
        name: summaryOnly
        type: boolean
      - default: json
        description: OutputFormat is the Output format for the output. If it is not
          specified, default is json.
        enum:
        - json
        - csv
        in: query
        name: outputFormat
        type: string
      - description: TopQuotas is the quotas sorted by quota usage in descending order.
          This parameter defines number of results to be returned. No pagination cookie
          is returned if this parameter is set.
        format: int64
        in: query
        name: topQuotas
        type: integer
      - description: Specifies a limit on the number of quotas returned. If maxCount
          is not set, response will have a maximum of 100 results. This parameter
          will be ignored if 'topQuotas' is set.
        format: int64
        in: query
        name: maxCount
        type: integer
      - description: Specifies the cookie. If there are more results than maxCount,
          response will include a cookie with has to be set as part of the next GET
          request.
        in: query
        name: cookie
        type: string
      - description: Specifies the user identifier of an Unix user. If a valid unix-id
          to SID mappings are available (i.e., when mixed mode is enabled) the server
          will perform the necessary id mapping and return the correct usage irrespective
          of whether the unix id / SID is provided. One of viewId, unixUid, sid must
          be specified.
        format: uint32
        in: query
        name: unixUid
        type: integer
      - description: Specifies the user identifier of a SMB user. If a valid unix-id
          to SID mappings are available (i.e., when mixed mode is enabled) the server
          will perform the necessary id mapping and return the correct usage irrespective
          of whether the unix id / SID is provided. One of viewId, unixUid, sid must
          be specified.
        in: query
        name: sid
        type: string
      - description: While making a query for a view, this specifies a list of specific
          users with their unix uid for the result.
        in: query
        items:
          format: uint32
          type: integer
        name: userUnixIdsForView
        type: array
      - description: While making a query for a view, this specifies a list of specific
          users with their Sid for the result.
        in: query
        items:
          type: string
        name: userSidsForView
        type: array
      - description: While making a query for a user, this specifies a list of specific
          views for the result.
        in: query
        items:
          type: string
        name: viewNamesForUser
        type: array
      - description: Specifies the max entries that should be returned in the result.
        format: int64
        in: query
        name: pageCount
        type: integer
      - description: Related to fetching a particular user's quota and usage in all
          his views. It only pertains to the scenario where either UnixUid or Sid
          is specified, and ViewName is nil. Specify the maxViewId for All the views
          returned would have view_id's less than or equal to the given MaxViewId
          if it is >= 0.
        format: int64
        in: query
        name: maxViewId
        type: integer
      responses:
        '200':
          description: Success
          schema:
            $ref: '#/definitions/ViewUserQuotas'
        default:
          description: Error
          schema:
            $ref: '#/definitions/Error'
      security:
      - Bearer: []
      - SessionIdHeader: []
      - APIKeyHeader: []
      summary: Get View user quotas.
      tags:
      - View
