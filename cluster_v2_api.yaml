          that the ongoing run has been paused. 'Failed' indicates that the run has
          failed. 'Missed' indicates that the run was unable to take place at the
          scheduled time because the previous run was still happening. 'Succeeded'
          indicates that the run has finished successfully. 'SucceededWithWarning'
          indicates that the run finished successfully, but there were some warning
          messages. 'Skipped' indicates that the run was skipped.
        enum:
        - Accepted
        - Running
        - Canceled
        - Canceling
        - Failed
        - Missed
        - Succeeded
        - SucceededWithWarning
        - OnHold
        - Finalizing
        - Skipped
        - LegalHold
        - Paused
        type: string
        x-nullable: true
      failoverId:
