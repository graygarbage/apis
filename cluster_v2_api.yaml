  /data-protect/indexing/runs/summary:
    get:
      description: '**Privileges:** ```PROTECTION_VIEW``` <br><br>Get the indexing
        runs summary for a given range.'
      operationId: GetIndexingRunsSummary
      parameters:
      - description: Filter by a list of source ids. Only indexing status of Job Runs
          protecting the specified sources (such as VM or View) are returned. The
          source id is assigned by the Cohesity Cluster.
        in: query
        items:
          format: int64
          type: integer
        name: sourceIds
        type: array
        x-nullable: true
      - default: 10
        description: Specify the source id batch size sent to ElasticSearch for fetching
          indexing status. Default is 10.
        format: int32
        in: query
        name: batchSize
        type: integer
        x-nullable: true
      - description: Filter by the indexing status.
        enum:
        - InProgress
        - Done
        - NoIndex
        - Error
        in: query
        name: indexingStatus
        type: string
        x-nullable: true
      - description: Start time for time range filter. Specify the start time as a
          Unix epoch Timestamp (in microseconds), only the indexing status of protection
          runs executing after this time will be returned. By default it is endTimeUsecs
          minus an hour.
        format: int64
        in: query
        name: startTimeUsecs
        type: integer
        x-nullable: true
      - description: End time for time range filter. Specify the end time as a Unix
          epoch Timestamp (in microseconds), only the indexing status of protection
          runs executing before this time will be returned. By default it is current
          time.
        format: int64
        in: query
        name: endTimeUsecs
        type: integer
        x-nullable: true
      responses:
        '200':
          description: Success
          schema:
            $ref: '#/definitions/GetDataProtectIndexingRunsSummaryResponse'
        default:
          description: Error
          schema:
            $ref: '#/definitions/Error'
      security:
      - Bearer: []
      - SessionIdHeader: []
      - APIKeyHeader: []
      summary: Get the list of indexing runs summary for a given range.
      tags:
      - ProtectionGroup
