  TargetSchedule:
    description: Specifies a schedule fregquency and schedule unit for copying Snapshots
      to backup targets.
    properties:
      frequency:
        description: 'Specifies a factor to multiply the unit by, to determine the
          copy schedule.

          For example if set to 2 and the unit is hourly, then Snapshots from the
          first eligible group Run for every 2 hour period is copied.'
        format: int32
        minimum: 1
        type: integer
        x-nullable: true
      monthSchedule:
        $ref: '#/definitions/MonthSchedule'
        description: Specifies which day of the month should be considered as the
          start of the month when calculating monthly granularity buckets. <br> Only
          applicable when unit is set to 'Months'. <br> If not specified, the 1st
          is used as the default start day.
        type: object
        x-nullable: true
      unit:
        description: Specifies the frequency that Snapshots should be copied to the
          specified target. Used in combination with multiplier. <br>'Runs' means
          that the Snapshot copy occurs after the number of Protection Group Runs
          equals the number specified in the frequency. <br>'Hours' means that the
          Snapshot copy occurs hourly at the frequency set in the frequency, for example
          if scheduleFrequency is 2, the copy occurs every 2 hours. <br>'Days' means
          that the Snapshot copy occurs daily at the frequency set in the frequency.
          <br>'Weeks' means that the Snapshot copy occurs weekly at the frequency
          set in the frequency. <br>'Months' means that the Snapshot copy occurs monthly
          at the frequency set in the Frequency. <br>'Years' means that the Snapshot
          copy occurs yearly at the frequency set in the scheduleFrequency.
        enum:
        - Runs
        - Hours
        - Days
        - Weeks
        - Months
        - Years
        type: string
        x-nullable: true
      weekSchedule:
        $ref: '#/definitions/WeekSchedule'
        description: Specifies which day of the week should be considered as the start
          of the week when calculating weekly granularity buckets. <br> Only applicable
          when unit is set to 'Weeks'. <br> If not specified, Monday is used as the
          default start day.
        x-nullable: true
      yearSchedule:
        $ref: '#/definitions/YearSchedule'
        description: Specifies which day of the year should be considered as the start
          of the year when calculating yearly granularity buckets. <br> Only applicable
          when unit is set to 'Years'. <br> If not specified, the 1st is used as the
          default start day.
        type: object
        x-nullable: true
