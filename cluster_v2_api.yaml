          - kRDSCustomOracleSnapshotManager
          - kAuroraSnapshotManager
          - kAuroraPostgresSnapshotManager
          - kAuroraMySQLSnapshotManager
          - kAwsRDSPostgresBackup
          - kAwsRDSPostgres
          - kAwsAuroraPostgres
          - kAWSMySQL
          - kAWSAuroraMySQL
          - kAwsDynamoDB
          - kAWSRdsOracle
          - kAWSDocumentDB
          - kAWSRDSPostgresDB
          - kAWSAuroraPostgresDB
          - kAWSRDSMSSQL
          - kAWSRedshift
          - kAzureNative
          - kAzureSQL
          - kAzureEntraID
          - kAzureMySQL
          - kAzureCosmosDBNoSQL
          - kAzureCosmosDBMongoDB
