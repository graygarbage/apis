        name: ids
        type: array
      - description: Filter by ObjectActionKey, uniquely represent protection of an
          object. An object can be protected in multiple ways but atmost once for
          a given combination of ObjectActionKey, when specified Only objects of given
          action_key are returned for corresponding object id. The vec's size needs
          to be of either length one or same as the length of 'ids'. If the length
          of objectActionKey is one, it will be repeated as many number of times equal
