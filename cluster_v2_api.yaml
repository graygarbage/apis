          - App
          - HeliosEvent
          - Object
          - ClusterServices
          - AccessToken
          - SnmpConfig
          - IoTier
          - ServiceFlag
          - SupportServer
          - Csr
          - Keystone
          - SwiftRoles
          - Tags
          - Nis
          - Snapshot
          - HybridExtender
          - DataTieringAnalysisGroup
          - DataTieringDowntierTask
          - DataTieringUptierTask
          - TrustedCA
          - AMQPTargetConfiguration
          - Patch
          - Hotfix
          - NisNetgroup
          - QuorumGroup
          - QuorumApplication
          - BifrostConnection
          - BifrostConnector
          - HostMapping
          - FirewallSetting
          - ClusterSnapshotPolicy
          - NodePower
          - CertStore
          - SyslogServerConfiguration
          - Email
          - Account
          - Datacenter
          - FortknoxVaultCluster
          - FortknoxVaultPair
          - CohesityCaRemoteTrustRoots
          - RecoveryScan
          - MediaServer
          - StorageServer
          - LSU
          type: string
        name: entityTypes
        type: array
        x-nullable: true
      - description: Specifies a list of actions, only audit logs containing these
          actions will be returned.
        in: query
        items:
          enum:
          - Login
          - Logout
          - Create
          - Modify
          - Delete
          - Activate
          - Deactivate
          - Pause
          - Resume
          - RunNow
          - Clone
          - Recover
          - Cancel
          - Register
          - Unregister
          - Update
          - Refresh
          - Upgrade
          - Upload
          - Download
          - Rename
          - Accept
          - Mark
          - Close
          - Join
          - DisJoin
          - Overwrite
          - MarkRemoval
          - CloudSpin
          - Assign
          - Unassign
          - NotificationRule
          - ScheduleReport
          - Install
          - Uninstall
          - Stop
